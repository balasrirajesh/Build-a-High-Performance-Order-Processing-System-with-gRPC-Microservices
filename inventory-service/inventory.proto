syntax = "proto3";

package inventory;

option go_package = "github.com/naren/gRPC-Order-System/protos/inventory";

service InventoryService {
  rpc CheckInventory(InventoryRequest) returns (InventoryResponse);
  rpc SubscribeStockUpdates(StockRequest) returns (stream StockUpdate);
}

message InventoryRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message InventoryResponse {
  bool available = 1;
  int32 current_stock = 2;
}

message StockRequest {
  string product_id = 1;
}

message StockUpdate {
  string product_id = 1;
  int32 stock_level = 2;
}
