version: '3.8'

services:
  order-service:
    build:
      context: ./order-service
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      - PORT=50051
      - REST_PORT=8080
      - INVENTORY_SERVICE_ADDR=inventory-service:50052
      - NOTIFICATION_SERVICE_ADDR=notification-service:50053
    depends_on:
      inventory-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "grpc-health-probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-service:
    build:
      context: ./inventory-service
    ports:
      - "50052:50052"
    environment:
      - PORT=50052
    healthcheck:
      test: ["CMD", "grpc-health-probe", "-addr=:50052"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./notification-service
    ports:
      - "50053:50053"
    environment:
      - PORT=50053
    healthcheck:
      test: ["CMD", "grpc-health-probe", "-addr=:50053"]
      interval: 10s
      timeout: 5s
      retries: 5
